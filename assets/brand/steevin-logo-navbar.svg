<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-labelledby="title desc">
  <title id="title">Steevin navbar logo</title>
  <desc id="desc">Compact Steevin logo for site navigation using the approved mark.</desc>
  <defs>
    <linearGradient id="mark-bg" x1="10" y1="12" x2="98" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.54" stop-color="#080D14"/>
      <stop offset="1" stop-color="#05070B"/>
    </linearGradient>
    <linearGradient id="signal" x1="34" y1="30" x2="82" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.46" stop-color="#2F8CFF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
