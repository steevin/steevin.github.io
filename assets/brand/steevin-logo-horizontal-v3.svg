<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Steevin horizontal logo v3</title>
  <desc id="desc">Editorial premium horizontal Steevin logo with approved mark and wide uppercase wordmark.</desc>
  <defs>
    <linearGradient id="mark-bg" x1="28" y1="34" x2="220" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.54" stop-color="#080D14"/>
      <stop offset="1" stop-color="#05070B"/>
    </linearGradient>
    <linearGradient id="signal" x1="78" y1="70" x2="180" y2="194" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.46" stop-color="#2F8CFF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#00E5FF" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g transform="translate(34 34) scale(0.96)">
    <rect width="200" height="200" rx="44" fill="url(#mark-bg)"/>
    <rect x="8" y="8" width="184" height="184" rx="37" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <g filter="url(#shadow)">
      <path
        d="M133 56C121 46 96 44 84 55C72 66 75 79 90 84C102 88 126 90 136 104C148 121 136 145 110 148C90 151 71 142 63 126"
        fill="none"
        stroke="url(#signal)"
        stroke-width="24"
        stroke-linecap="round"
        stroke-linejoin="round"/>
    </g>
    <path d="M73 68L58 84L73 100" fill="none" stroke="#090F17" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M134 103L149 119L134 135" fill="none" stroke="#090F17" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <g opacity="0.56" stroke="url(#signal)" stroke-width="2.7" stroke-linecap="round">
      <path d="M159 31L176 43L188 35" fill="none"/>
      <circle cx="159" cy="31" r="3.8" fill="#0B111A"/>
      <circle cx="176" cy="43" r="3.8" fill="#0B111A"/>
      <circle cx="188" cy="35" r="3.8" fill="#0B111A"/>
    </g>
  </g>

  <text
    x="286"
    y="144"
    fill="#F8FAFC"
    font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif"
    font-size="58"
    font-weight="720"
    letter-spacing="13">STEEVIN</text>
  <rect x="290" y="164" width="346" height="2" rx="1" fill="#00E5FF" opacity="0.86"/>
</svg>
