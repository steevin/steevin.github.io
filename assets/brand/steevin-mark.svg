<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Steevin brand mark</title>
  <desc id="desc">Premium personal brand mark for Steevin with an abstract S, subtle code angles, and a quiet node pattern.</desc>
  <defs>
    <linearGradient id="bg" x1="116" y1="96" x2="912" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#080D14"/>
      <stop offset="1" stop-color="#05070B"/>
    </linearGradient>
    <linearGradient id="signal" x1="270" y1="234" x2="742" y2="768" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.46" stop-color="#2F8CFF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="signal-soft" x1="302" y1="254" x2="706" y2="754" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="0.45" stop-color="#BFEFFF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#000000" flood-opacity="0.42"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#00E5FF" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect x="36" y="36" width="952" height="952" rx="196" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
  <path d="M208 516H816" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
  <path d="M512 184V840" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>

  <g filter="url(#shadow)">
    <path
      d="M666 286C607 233 482 226 418 282C360 333 372 404 450 431C510 452 626 458 677 527C737 608 678 724 548 741C450 754 356 710 316 628"
      fill="none"
      stroke="url(#signal)"
      stroke-width="112"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <path
      d="M654 291C600 249 494 242 436 291C392 328 400 378 460 402C520 426 630 430 676 499"
      fill="none"
      stroke="url(#signal-soft)"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.74"/>
  </g>

  <g opacity="0.86">
    <path d="M354 344L280 424L354 504" fill="none" stroke="#090F17" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M670 520L744 600L670 680" fill="none" stroke="#090F17" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g opacity="0.56" stroke="url(#signal)" stroke-width="10" stroke-linecap="round">
    <path d="M792 176L856 222L914 184" fill="none"/>
    <circle cx="792" cy="176" r="14" fill="#0B111A" stroke="url(#signal)" stroke-width="10"/>
    <circle cx="856" cy="222" r="14" fill="#0B111A" stroke="url(#signal)" stroke-width="10"/>
    <circle cx="914" cy="184" r="14" fill="#0B111A" stroke="url(#signal)" stroke-width="10"/>
  </g>
</svg>
